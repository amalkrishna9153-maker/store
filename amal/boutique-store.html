<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Chic Boutique - Elegant E-commerce</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fdf8f5;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
        }

        /* Elegant Header */
        .top-bar {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 1rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(232, 182, 148, 0.3);
            position: sticky;
            top: 1rem;
            z-index: 100;
        }

        .logo h2 {
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #c49a6c, #8b5e3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            font-size: 2rem;
            letter-spacing: -0.5px;
        }

        .logo span {
            background: linear-gradient(135deg, #e8b68c, #d4956a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            background: linear-gradient(135deg, #fdf8f5, #fff);
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            transition: 0.3s;
            border: 1px solid #e8b68c;
            color: #8b5e3c;
            font-weight: 500;
        }

        .cart-icon:hover {
            background: linear-gradient(135deg, #e8b68c, #d4956a);
            color: white;
            transform: translateY(-2px);
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #c49a6c;
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .nav-btn {
            background: transparent;
            border: none;
            padding: 0.6rem 1.2rem;
            font-weight: 500;
            border-radius: 2rem;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
            color: #8b5e3c;
            font-family: 'Poppins', sans-serif;
        }

        .nav-btn:hover {
            background: #fdf0e6;
            transform: translateY(-2px);
        }

        .logout-btn {
            background: linear-gradient(135deg, #e8b68c, #d4956a);
            color: white;
            border: none;
        }

        .logout-btn:hover {
            background: linear-gradient(135deg, #d4956a, #c49a6c);
            transform: translateY(-2px);
        }

        .user-greeting {
            background: linear-gradient(135deg, #c49a6c, #8b5e3c);
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-weight: 500;
            font-size: 0.9rem;
            font-family: 'Poppins', sans-serif;
        }

        /* Cards with elegant design */
        .card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.8rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            transition: all 0.3s;
            border: 1px solid #f0e0d4;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
        }

        /* Product Grid - Boutique Style */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 1.5rem;
        }

        .product-card {
            background: white;
            border-radius: 1.5rem;
            overflow: hidden;
            transition: all 0.4s;
            border: 1px solid #f0e0d4;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .product-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .product-card:hover .product-img {
            transform: scale(1.05);
        }

        .product-info {
            padding: 1.2rem;
        }

        .product-name {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: #5c3b2a;
            margin-bottom: 0.5rem;
        }

        .product-price {
            color: #c49a6c;
            font-weight: 700;
            font-size: 1.4rem;
            margin: 0.5rem 0;
            font-family: 'Playfair Display', serif;
        }

        .add-to-cart-btn {
            width: 100%;
            background: linear-gradient(135deg, #c49a6c, #8b5e3c);
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .add-to-cart-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(196, 154, 108, 0.4);
        }

        /* Cart Sidebar - Elegant */
        .cart-sidebar {
            position: fixed;
            right: -480px;
            top: 0;
            width: 480px;
            height: 100vh;
            background: white;
            box-shadow: -10px 0 40px rgba(0, 0, 0, 0.1);
            transition: right 0.4s ease;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            font-family: 'Poppins', sans-serif;
        }

        .cart-sidebar.open {
            right: 0;
        }

        .cart-header {
            padding: 1.5rem;
            border-bottom: 2px solid #f0e0d4;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #fdf8f5, #fff);
        }

        .cart-header h3 {
            font-family: 'Playfair Display', serif;
            color: #5c3b2a;
        }

        .cart-items {
            flex: 1;
            padding: 1rem;
        }

        .cart-item {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid #f0e0d4;
            align-items: center;
        }

        .cart-item-img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 1rem;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 600;
            color: #5c3b2a;
            font-family: 'Playfair Display', serif;
        }

        .cart-item-price {
            color: #c49a6c;
            font-weight: 600;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .quantity-btn {
            background: #fdf0e6;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            color: #8b5e3c;
            transition: 0.2s;
        }

        .quantity-btn:hover {
            background: #c49a6c;
            color: white;
        }

        .cart-footer {
            padding: 1.5rem;
            border-top: 2px solid #f0e0d4;
            background: white;
        }

        .checkout-btn {
            width: 100%;
            background: linear-gradient(135deg, #c49a6c, #8b5e3c);
            padding: 1rem;
            font-size: 1.1rem;
            margin-top: 1rem;
            border: none;
            border-radius: 2rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(196, 154, 108, 0.4);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        /* Tables */
        .orders-table, .users-table {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #f0e0d4;
        }

        th {
            background: #fdf8f5;
            font-weight: 600;
            color: #5c3b2a;
            font-family: 'Playfair Display', serif;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }

        .status-pending {
            background: #fff3e0;
            color: #c49a6c;
        }

        .status-completed {
            background: #e8f5e9;
            color: #8b5e3c;
        }

        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.2rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: linear-gradient(135deg, #c49a6c, #8b5e3c);
            color: white;
            padding: 1.5rem;
            border-radius: 1.5rem;
            text-align: center;
            transition: 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            font-family: 'Playfair Display', serif;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        input, select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #f0e0d4;
            border-radius: 1rem;
            font-size: 0.95rem;
            font-family: 'Poppins', sans-serif;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #c49a6c;
        }

        button {
            cursor: pointer;
        }

        h3 {
            font-family: 'Playfair Display', serif;
            color: #5c3b2a;
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .cart-sidebar {
                width: 100%;
                right: -100%;
            }
        }
    </style>
</head>
<body>
<div class="app-container" id="app"></div>
<div class="overlay" id="cartOverlay"></div>
<div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
        <h3><i class="fas fa-shopping-bag"></i> Your Shopping Bag</h3>
        <button class="nav-btn" id="closeCartBtn"><i class="fas fa-times"></i></button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
        <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
            <strong>Subtotal:</strong>
            <strong id="cartTotal" style="color:#c49a6c;">$0.00</strong>
        </div>
        <button class="checkout-btn" id="checkoutBtn"><i class="fas fa-credit-card"></i> Proceed to Checkout</button>
    </div>
</div>

<script>
    // Storage keys
    const STORAGE_USERS = "boutique_users";
    const STORAGE_PRODUCTS = "boutique_products";
    const STORAGE_SESSION = "boutique_session";
    const STORAGE_ORDERS = "boutique_orders";
    const STORAGE_CART = "boutique_cart";

    // Get users with phone numbers
    function getUsers() {
        const data = localStorage.getItem(STORAGE_USERS);
        if (!data) {
            const defaultUsers = [
                { id: "u1", fullname: "Admin Boutique", email: "admin@gmail.com", password: "admin123", role: "admin", phone: "+1234567890" },
                { id: "u2", fullname: "AMAL", email: "amal@gmail.com", password: "amal123", role: "user", phone: "8137924760" }
            ];
            localStorage.setItem(STORAGE_USERS, JSON.stringify(defaultUsers));
            return defaultUsers;
        }
        return JSON.parse(data);
    }

    function saveUsers(users) {
        localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
    }

    function getProducts() {
        const data = localStorage.getItem(STORAGE_PRODUCTS);
        if (!data) {
            const sampleProducts = [
                { id: "p1", name: "Silk Evening Gown", price: 299.99, imageUrl: "https://picsum.photos/id/30/300/250", stock: 15 },
                { id: "p2", name: "Leather Handbag", price: 189.99, imageUrl: "https://picsum.photos/id/20/300/250", stock: 8 },
                { id: "p3", name: "Cashmere Scarf", price: 89.99, imageUrl: "https://picsum.photos/id/17/300/250", stock: 25 },
                { id: "p4", name: "Diamond Necklace", price: 499.99, imageUrl: "https://picsum.photos/id/26/300/250", stock: 5 }
            ];
            localStorage.setItem(STORAGE_PRODUCTS, JSON.stringify(sampleProducts));
            return sampleProducts;
        }
        return JSON.parse(data);
    }

    function saveProducts(products) {
        localStorage.setItem(STORAGE_PRODUCTS, JSON.stringify(products));
    }

    function getOrders() {
        const data = localStorage.getItem(STORAGE_ORDERS);
        if (!data) return [];
        return JSON.parse(data);
    }

    function saveOrders(orders) {
        localStorage.setItem(STORAGE_ORDERS, JSON.stringify(orders));
    }

    function getSession() {
        const sess = localStorage.getItem(STORAGE_SESSION);
        return sess ? JSON.parse(sess) : null;
    }

    function setSession(user) {
        if (!user) {
            localStorage.removeItem(STORAGE_SESSION);
            return;
        }
        localStorage.setItem(STORAGE_SESSION, JSON.stringify({ id: user.id, email: user.email, role: user.role, fullname: user.fullname, phone: user.phone }));
    }

    function getCart() {
        const cart = localStorage.getItem(STORAGE_CART);
        return cart ? JSON.parse(cart) : [];
    }

    function saveCart(cart) {
        localStorage.setItem(STORAGE_CART, JSON.stringify(cart));
    }

    let currentUser = getSession();
    let cart = getCart();
    let cartOpen = false;

    function updateCartUI() {
        const cartItemsDiv = document.getElementById("cartItems");
        const cartTotalSpan = document.getElementById("cartTotal");
        if (!cartItemsDiv) return;

        if (cart.length === 0) {
            cartItemsDiv.innerHTML = '<div style="text-align:center;padding:2rem;"><i class="fas fa-shopping-bag" style="font-size:3rem;color:#d1d5db"></i><p style="margin-top:1rem;color:#8b5e3c;">Your boutique bag is empty</p></div>';
            if (cartTotalSpan) cartTotalSpan.innerText = "$0.00";
            return;
        }

        let total = 0;
        cartItemsDiv.innerHTML = cart.map(item => {
            total += item.price * item.quantity;
            return `
                <div class="cart-item">
                    <img class="cart-item-img" src="${item.imageUrl}" onerror="this.src='https://picsum.photos/id/30/70/70'">
                    <div class="cart-item-details">
                        <div class="cart-item-name">${escapeHtml(item.name)}</div>
                        <div class="cart-item-price">$${item.price}</div>
                        <div class="quantity-controls">
                            <button class="quantity-btn" onclick="updateQuantity('${item.id}', -1)">-</button>
                            <span>${item.quantity}</span>
                            <button class="quantity-btn" onclick="updateQuantity('${item.id}', 1)">+</button>
                            <button class="quantity-btn" onclick="removeFromCart('${item.id}')" style="background:#fee2e2;"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
        if (cartTotalSpan) cartTotalSpan.innerText = `$${total.toFixed(2)}`;
    }

    window.updateQuantity = function(productId, delta) {
        const index = cart.findIndex(i => i.id === productId);
        if (index !== -1) {
            const newQty = cart[index].quantity + delta;
            if (newQty <= 0) {
                cart.splice(index, 1);
            } else {
                cart[index].quantity = newQty;
            }
            saveCart(cart);
            updateCartUI();
            renderApp();
        }
    };

    window.removeFromCart = function(productId) {
        cart = cart.filter(i => i.id !== productId);
        saveCart(cart);
        updateCartUI();
        renderApp();
    };

    function addToCart(product) {
        const existing = cart.find(i => i.id === product.id);
        if (existing) {
            existing.quantity++;
        } else {
            cart.push({ ...product, quantity: 1 });
        }
        saveCart(cart);
        updateCartUI();
        renderApp();
        openCart();
    }

    function openCart() {
        cartOpen = true;
        document.getElementById("cartSidebar").classList.add("open");
        document.getElementById("cartOverlay").classList.add("active");
        updateCartUI();
    }

    function closeCart() {
        cartOpen = false;
        document.getElementById("cartSidebar").classList.remove("open");
        document.getElementById("cartOverlay").classList.remove("active");
    }

    function checkout() {
        if (cart.length === 0) {
            alert("Your boutique bag is empty!");
            return;
        }

        const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        const order = {
            id: "BOUTIQUE" + Date.now(),
            userId: currentUser.id,
            userName: currentUser.fullname,
            userEmail: currentUser.email,
            userPhone: currentUser.phone || "Not provided",
            items: cart.map(i => ({ id: i.id, name: i.name, price: i.price, quantity: i.quantity })),
            total: total,
            status: "pending",
            createdAt: new Date().toISOString()
        };

        const orders = getOrders();
        orders.push(order);
        saveOrders(orders);

        // Update stock
        const products = getProducts();
        cart.forEach(cartItem => {
            const prod = products.find(p => p.id === cartItem.id);
            if (prod) {
                prod.stock -= cartItem.quantity;
            }
        });
        saveProducts(products);

        cart = [];
        saveCart(cart);
        updateCartUI();
        closeCart();
        renderApp();
        alert("Order placed successfully! Thank you for shopping at Chic Boutique!");
    }

    function renderApp() {
        const appDiv = document.getElementById("app");
        if (!currentUser) {
            appDiv.innerHTML = renderAuthScreen();
            attachAuthEvents();
        } else {
            if (currentUser.role === "admin") {
                appDiv.innerHTML = renderAdminDashboard();
                attachAdminEvents();
            } else {
                appDiv.innerHTML = renderUserDashboard();
                attachUserEvents();
            }
            attachGlobalNavEvents();
        }
        updateCartUI();
        document.getElementById("closeCartBtn")?.addEventListener("click", closeCart);
        document.getElementById("cartOverlay")?.addEventListener("click", closeCart);
        document.getElementById("checkoutBtn")?.addEventListener("click", checkout);
    }

    function renderAuthScreen() {
        return `
            <div class="top-bar">
                <div class="logo"><h2>Chic <span>Boutique</span></h2></div>
                <div class="nav-links"><span class="user-greeting"><i class="fas fa-heart"></i> Luxury & Elegance</span></div>
            </div>
            <div style="display: flex; flex-wrap: wrap; gap: 2rem; justify-content: center; margin-top: 3rem;">
                <div class="card" style="flex:1; max-width:420px;">
                    <h3><i class="fas fa-sign-in-alt"></i> Welcome Back</h3>
                    <div id="loginError" class="error-msg" style="margin-bottom: 10px;color:#ef4444;"></div>
                    <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="admin@boutique.com"></div>
                    <div class="form-group"><label>Password</label><input type="password" id="loginPassword"></div>
                    <button id="doLoginBtn" style="background:linear-gradient(135deg,#c49a6c,#8b5e3c);">Sign In</button>
                </div>
                <div class="card" style="flex:1; max-width:420px;">
                    <h3><i class="fas fa-user-plus"></i> Join Chic Boutique</h3>
                    <div id="regError" class="error-msg" style="color:#ef4444;"></div>
                    <div id="regSuccess" class="success-msg" style="display:none;color:#8b5e3c;background:#fdf0e6;padding:0.5rem;border-radius:0.5rem;"></div>
                    <div class="form-group"><label>Full Name</label><input type="text" id="regFullname" placeholder="Your Name"></div>
                    <div class="form-group"><label>Email</label><input type="email" id="regEmail" placeholder="you@example.com"></div>
                    <div class="form-group"><label>Phone Number</label><input type="tel" id="regPhone" placeholder="+1234567890"></div>
                    <div class="form-group"><label>Password</label><input type="password" id="regPassword" placeholder="Minimum 4 characters"></div>
                    <button id="doRegisterBtn" style="background:linear-gradient(135deg,#c49a6c,#8b5e3c);">Create Account</button>
                </div>
            </div>
            <div style="text-align:center;margin-top:2rem;color:#8b5e3c;"></div>
        `;
    }

    function attachAuthEvents() {
        document.getElementById("doLoginBtn")?.addEventListener("click", () => {
            const email = document.getElementById("loginEmail").value.trim();
            const pwd = document.getElementById("loginPassword").value.trim();
            const user = getUsers().find(u => u.email === email && u.password === pwd);
            if (user) {
                currentUser = { id: user.id, email: user.email, role: user.role, fullname: user.fullname, phone: user.phone };
                setSession(currentUser);
                renderApp();
            } else {
                document.getElementById("loginError").innerText = "Invalid credentials";
            }
        });
        document.getElementById("doRegisterBtn")?.addEventListener("click", () => {
            const fullname = document.getElementById("regFullname").value.trim();
            const email = document.getElementById("regEmail").value.trim();
            const phone = document.getElementById("regPhone").value.trim();
            const password = document.getElementById("regPassword").value.trim();
            if (!fullname || !email || !phone || password.length < 4) {
                document.getElementById("regError").innerText = "All fields required, password min 4 chars";
                return;
            }
            const users = getUsers();
            if (users.find(u => u.email === email)) {
                document.getElementById("regError").innerText = "Email already exists";
                return;
            }
            const newUser = { 
                id: "u" + Date.now(), 
                fullname, 
                email, 
                phone, 
                password, 
                role: "user" 
            };
            users.push(newUser);
            saveUsers(users);
            const successDiv = document.getElementById("regSuccess");
            successDiv.style.display = "block";
            successDiv.innerText = "Welcome to Chic Boutique! Please login.";
            setTimeout(() => {
                successDiv.style.display = "none";
            }, 3000);
            document.getElementById("regFullname").value = "";
            document.getElementById("regEmail").value = "";
            document.getElementById("regPhone").value = "";
            document.getElementById("regPassword").value = "";
        });
    }

    function renderUserDashboard() {
        const products = getProducts();
        const cartCount = cart.reduce((sum, i) => sum + i.quantity, 0);
        return `
            <div class="top-bar">
                <div class="logo"><h2>Chic <span>Boutique</span></h2></div>
                <div class="nav-links">
                    <span class="user-greeting"><i class="fas fa-user"></i> ${currentUser.fullname}</span>
                    <div class="cart-icon" id="cartIcon">
                        <i class="fas fa-shopping-bag"></i> Bag
                        ${cartCount > 0 ? `<span class="cart-count">${cartCount}</span>` : ''}
                    </div>
                    <button class="nav-btn logout-btn" id="globalLogoutBtn">Logout</button>
                </div>
            </div>
            <div class="card">
                <h3><i class="fas fa-star"></i> Our Curated Collection</h3>
                <div class="product-grid">
                    ${products.map(prod => `
                        <div class="product-card">
                            <img class="product-img" src="${prod.imageUrl}" onerror="this.src='https://picsum.photos/id/30/300/250'">
                            <div class="product-info">
                                <div class="product-name">${escapeHtml(prod.name)}</div>
                                <div class="product-price">$${prod.price}</div>
                                <small>Availability: ${prod.stock} left</small>
                                <button class="add-to-cart-btn" onclick="addToCart({id:'${prod.id}',name:'${escapeHtml(prod.name)}',price:${prod.price},imageUrl:'${prod.imageUrl}'})">
                                    <i class="fas fa-bag-shopping"></i> Add to Bag
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
    }

    function renderAdminDashboard() {
        const products = getProducts();
        const orders = getOrders();
        const users = getUsers().filter(u => u.role === "user");
        const totalOrders = orders.length;
        const totalRevenue = orders.reduce((sum, o) => sum + o.total, 0);
        const pendingOrders = orders.filter(o => o.status === "pending").length;

        return `
            <div class="top-bar">
                <div class="logo"><h2>Chic <span>Boutique</span> Admin</h2></div>
                <div class="nav-links">
                    <span class="user-greeting"><i class="fas fa-user-shield"></i> ${currentUser.fullname}</span>
                    <button class="nav-btn logout-btn" id="globalLogoutBtn">Logout</button>
                </div>
            </div>
            <div class="admin-stats">
                <div class="stat-card"><div class="stat-number">${totalOrders}</div><div>Total Orders</div></div>
                <div class="stat-card"><div class="stat-number">$${totalRevenue.toFixed(2)}</div><div>Revenue</div></div>
                <div class="stat-card"><div class="stat-number">${pendingOrders}</div><div>Pending Orders</div></div>
                <div class="stat-card"><div class="stat-number">${products.length}</div><div>Products</div></div>
                <div class="stat-card"><div class="stat-number">${users.length}</div><div>Customers</div></div>
            </div>
            <div style="display:grid; gap:2rem;">
                <div class="card">
                    <h3><i class="fas fa-plus-circle"></i> Add New Product</h3>
                    <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:1rem;">
                        <input type="text" id="prodName" placeholder="Product Name">
                        <input type="number" id="prodPrice" placeholder="Price">
                        <input type="text" id="prodImage" placeholder="Image URL">
                        <input type="number" id="prodStock" placeholder="Stock">
                        <button id="addProductBtn" style="background:linear-gradient(135deg,#c49a6c,#8b5e3c);">Add to Collection</button>
                    </div>
                </div>
                <div class="card">
                    <h3><i class="fas fa-users"></i> Boutique Customers (with Phone Numbers)</h3>
                    <div class="users-table">
                        <table>
                            <thead>
                                <tr><th>Name</th><th>Email</th><th>Phone Number</th><th>Member Since</th></tr>
                            </thead>
                            <tbody>
                                ${users.map(user => `
                                    <tr>
                                        <td><i class="fas fa-crown"></i> ${escapeHtml(user.fullname)}</td>
                                        <td>${escapeHtml(user.email)}</td>
                                        <td><i class="fas fa-phone-alt"></i> <strong>${escapeHtml(user.phone || 'Not provided')}</strong></td>
                                        <td>${new Date(parseInt(user.id.substring(1))).toLocaleDateString() || 'Recent'}</td>
                                    </tr>
                                `).join('')}
                                ${users.length === 0 ? '<tr><td colspan="4" style="text-align:center;">No registered customers yet</td>' : ''}
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="card">
                    <h3><i class="fas fa-boxes"></i> Manage Collection</h3>
                    <div class="product-grid">
                        ${products.map(prod => `
                            <div class="product-card">
                                <img class="product-img" src="${prod.imageUrl}" style="height:150px;">
                                <div class="product-info">
                                    <div class="product-name">${escapeHtml(prod.name)}</div>
                                    <div>$${prod.price} | Stock: ${prod.stock}</div>
                                    <button onclick="deleteProduct('${prod.id}')" style="background:#ef4444;margin-top:0.5rem;">Remove</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="card">
                    <h3><i class="fas fa-shopping-bag"></i> Customer Orders & Contact Info</h3>
                    <div class="orders-table">
                        <table>
                            <thead>
                                <tr><th>Order ID</th><th>Customer</th><th>Phone</th><th>Items</th><th>Total</th><th>Status</th><th>Action</th></tr>
                            </thead>
                            <tbody>
                                ${orders.map(order => `
                                    <tr>
                                        <td>${order.id}</td>
                                        <td><i class="fas fa-user"></i> ${escapeHtml(order.userName)}<br><small>${order.userEmail}</small></td>
                                        <td><i class="fas fa-phone"></i> <strong>${escapeHtml(order.userPhone || 'Not provided')}</strong></td>
                                        <td><small>${order.items.map(i => `${i.name} x${i.quantity}`).join(', ')}</small></td>
                                        <td>$${order.total.toFixed(2)}</td>
                                        <td><span class="status-badge status-${order.status}">${order.status}</span></td>
                                        <td><button onclick="completeOrder('${order.id}')" style="background:#10b981;padding:0.3rem 0.8rem;">Complete</button></td>
                                    </tr>
                                `).join('')}
                                ${orders.length === 0 ? '<tr><td colspan="7" style="text-align:center;">No orders yet</td>' : ''}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        `;
    }

    window.deleteProduct = function(productId) {
        let products = getProducts();
        products = products.filter(p => p.id !== productId);
        saveProducts(products);
        renderApp();
    };

    window.completeOrder = function(orderId) {
        const orders = getOrders();
        const order = orders.find(o => o.id === orderId);
        if (order) {
            order.status = "completed";
            saveOrders(orders);
            renderApp();
        }
    };

    function attachAdminEvents() {
        document.getElementById("addProductBtn")?.addEventListener("click", () => {
            const name = document.getElementById("prodName").value.trim();
            const price = parseFloat(document.getElementById("prodPrice").value);
            const image = document.getElementById("prodImage").value.trim();
            const stock = parseInt(document.getElementById("prodStock").value);
            if (!name || isNaN(price) || isNaN(stock)) return alert("Fill all fields");
            const products = getProducts();
            products.push({ id: "p" + Date.now(), name, price, imageUrl: image || "https://picsum.photos/id/30/300/250", stock });
            saveProducts(products);
            renderApp();
        });
    }

    function attachUserEvents() {
        document.getElementById("cartIcon")?.addEventListener("click", openCart);
    }

    function attachGlobalNavEvents() {
        document.getElementById("globalLogoutBtn")?.addEventListener("click", () => {
            currentUser = null;
            setSession(null);
            cart = [];
            saveCart(cart);
            renderApp();
        });
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    renderApp();
</script>
</body>
</html>
